<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    <script>
        let requestCount = 0;
        const rateLimit = 5;
        const timeFrame = 60000; // 1 minute
        let cache = {};

        function updateRequestCount() {
            requestCount++;
            setTimeout(() => {
                requestCount--;
            }, timeFrame);
        }

        async function fetchModelResponse(model, message) {
            if (requestCount >= rateLimit) {
                alert("Rate limit exceeded. Please wait a moment.");
                return;
            }
            updateRequestCount();

            const cacheKey = `${model}-${message}`;
            if (cache[cacheKey]) {
                displayMessage("Bot", cache[cacheKey]);
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/models/${model}`, { method: 'POST', body: JSON.stringify({ message }) });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message);
                cache[cacheKey] = data.response; // Cache response
                displayMessage("Bot", data.response);
            } catch (error) {
                displayMessage("Error", error.message);
            }
        }

        function displayMessage(sender, message) {
            const chatHistory = document.getElementById("chatHistory");
            chatHistory.innerHTML += `<b>${sender}:</b> ${message}<br>`;
        }

        function sendMessage() {
            const modelSelect = document.getElementById("modelSelect");
            const messageInput = document.getElementById("messageInput");
            const selectedModel = modelSelect.value;
            const userMessage = messageInput.value;
            displayMessage("You", userMessage);
            fetchModelResponse(selectedModel, userMessage);
            messageInput.value = ""; // Clear input
        }
    </script>
</head>
<body>
    <h1>Telegram Mini App</h1>
    <div>
        <label for="modelSelect">Select AI Model:</label>
        <select id="modelSelect">
            <option value="model1">Model 1</option>
            <option value="model2">Model 2</option>
        </select>
        <input type="text" id="messageInput" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>
    <div id="chatHistory" style="border: 1px solid black; padding: 10px; height: 300px; overflow-y: auto;"></div>
</body>
</html>
