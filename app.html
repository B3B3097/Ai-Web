<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 AI Chat Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0f3460 0%, #16213e 100%); font-family: 'Segoe UI', sans-serif; color: #fff; min-height: 100vh; padding: 10px; }
        .container { max-width: 600px; margin: 0 auto; background: #1a1a2e; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); padding: 20px; text-align: center; border-radius: 20px 20px 0 0; }
        .header h1 { font-size: 24px; font-weight: 700; }
        .models-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 15px; background: #16213e; }
        .model-btn { padding: 12px; background: #0f3460; border: 2px solid #2a5a3a; border-radius: 12px; color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s; }
        .model-btn:hover { background: #1a4a2a; border-color: #16a34a; }
        .model-btn.active { background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); border-color: #22c55e; box-shadow: 0 0 20px rgba(22, 163, 74, 0.5); }
        .features { padding: 0 15px 15px 15px; display: flex; gap: 10px; flex-wrap: wrap; background: #16213e; }
        .feature-btn { padding: 8px 15px; background: #2a5a3a; border: 1px solid #16a34a; border-radius: 8px; color: #90ee90; cursor: pointer; font-size: 12px; }
        .feature-btn:hover { background: #16a34a; color: #fff; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 12px 15px; border-radius: 12px; word-wrap: break-word; line-height: 1.5; font-size: 14px; max-width: 85%; }
        .message.user { align-self: flex-end; background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); border-radius: 12px 0 12px 12px; }
        .message.bot { align-self: flex-start; background: #2a5a3a; border-left: 4px solid #16a34a; border-radius: 0 12px 12px 12px; }
        .input-section { padding: 15px; background: #0f3460; border-top: 2px solid #16213e; display: flex; gap: 10px; }
        .input-wrapper { flex: 1; display: flex; align-items: center; background: #16213e; border-radius: 12px; border: 2px solid #2a5a3a; padding: 0 10px; }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 14px; outline: none; }
        .image-btn { background: #4ade80; border: none; color: #0f3460; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: 700; }
        .send-btn { background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); border: none; color: #fff; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Chat Bot</h1>
            <p>Select model and start chatting</p>
        </div>

        <div class="models-grid">
            <button class="model-btn active" onclick="selectModel('gpt4')">🧠 GPT-4</button>
            <button class="model-btn" onclick="selectModel('gpt35')">⚡ GPT-3.5</button>
            <button class="model-btn" onclick="selectModel('claude')">🎯 Claude</button>
            <button class="model-btn" onclick="selectModel('gemini')">✨ Gemini</button>
        </div>

        <div class="features">
            <button class="feature-btn" onclick="toggleFeature('search')">🔍 Search</button>
            <button class="feature-btn" onclick="toggleFeature('reasoning')">💭 Reasoning</button>
            <button class="feature-btn active" onclick="toggleFeature('fullresponse')">📝 Full Response</button>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="input-section">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Type your message...">
                <button class="image-btn" onclick="addImage()">+</button>
            </div>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        let selectedModel = 'gpt4';
        let selectedFeatures = ['fullresponse'];
        let messageCount = 0;
        let lastResetTime = Date.now();
        const RATE_LIMIT = 10;
        const RATE_LIMIT_WINDOW = 60000;
        let isLoading = false;

        const modelNames = {
            gpt4: 'GPT-4',
            gpt35: 'GPT-3.5 Turbo',
            claude: 'Claude 3 Opus',
            gemini: 'Google Gemini'
        };

        function selectModel(model) {
            selectedModel = model;
            document.querySelectorAll('.model-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.model-btn').classList.add('active');
        }

        function toggleFeature(feature) {
            const btn = event.target.closest('.feature-btn');
            if (selectedFeatures.includes(feature)) {
                selectedFeatures = selectedFeatures.filter(f => f !== feature);
                btn.classList.remove('active');
            } else {
                selectedFeatures.push(feature);
                btn.classList.add('active');
            }
        }

        function addMessage(text, sender) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.textContent = text;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function checkRateLimit() {
            const now = Date.now();
            if (now - lastResetTime > RATE_LIMIT_WINDOW) {
                messageCount = 0;
                lastResetTime = now;
            }
            if (messageCount >= RATE_LIMIT) return false;
            messageCount++;
            return true;
        }

        function sendMessage() {
            if (isLoading) return;
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            if (!checkRateLimit()) {
                addMessage('⚠️ Rate limit reached! Wait a moment.', 'bot');
                return;
            }
            addMessage(message, 'user');
            input.value = '';
            isLoading = true;

            setTimeout(() => {
                const fullResponse = `I'm ${modelNames[selectedModel]}. Your message: "${message}"\n\nWith full response mode enabled, I provide complete, detailed answers without any truncation. Whether you need in-depth analysis, comprehensive explanations, or thorough assistance, I'll give you the full picture.\n\nFeatures enabled: ${selectedFeatures.join(', ')}\n\nHow can I help you further?`;
                addMessage(fullResponse, 'bot');
                isLoading = false;
            }, 1500);
        }

        function addImage() {
            addMessage('📸 Image upload feature coming soon!', 'bot');
        }

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        addMessage('👋 Welcome! Select a model and start chatting. I will provide full, detailed responses without cutting them short.', 'bot');
    </script>
</body>
  </html>
