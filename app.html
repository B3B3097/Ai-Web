<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 AI Chat Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0f3460 0%, #16213e 100%); font-family: 'Segoe UI', sans-serif; color: #fff; min-height: 100vh; padding: 10px; }
        .container { max-width: 700px; margin: 0 auto; background: #1a1a2e; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header with compact model selector */
        .header { background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 20px 20px 0 0; }
        .header h1 { font-size: 20px; font-weight: 700; }
        .model-selector { display: flex; align-items: center; gap: 8px; }
        .model-selector label { font-size: 12px; opacity: 0.9; }
        .model-selector select { background: #0f3460; border: 2px solid #2a5a3a; border-radius: 8px; color: #fff; padding: 6px 12px; font-size: 13px; cursor: pointer; outline: none; }
        .model-selector select:hover { border-color: #16a34a; }
        
        /* Features bar */
        .features { padding: 10px 15px; display: flex; gap: 8px; flex-wrap: wrap; background: #16213e; border-bottom: 1px solid #2a5a3a; }
        .feature-btn { padding: 6px 12px; background: #2a5a3a; border: 1px solid #16a34a; border-radius: 8px; color: #90ee90; cursor: pointer; font-size: 11px; transition: all 0.3s; }
        .feature-btn:hover { background: #16a34a; color: #fff; }
        .feature-btn.active { background: #16a34a; color: #fff; }
        
        /* Main content area */
        .main-content { flex: 1; display: flex; overflow: hidden; }
        
        /* Chat area */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 12px 15px; border-radius: 12px; word-wrap: break-word; line-height: 1.5; font-size: 14px; max-width: 85%; }
        .message.user { align-self: flex-end; background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); border-radius: 12px 0 12px 12px; }
        .message.bot { align-self: flex-start; background: #2a5a3a; border-left: 4px solid #16a34a; border-radius: 0 12px 12px 12px; }
        .message.error { align-self: center; background: #dc2626; border-radius: 12px; text-align: center; }
        .message .file-attachment { display: inline-block; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 4px; margin-top: 4px; font-size: 12px; }
        
        /* Files sidebar */
        .files-sidebar { width: 220px; background: #0f3460; border-left: 2px solid #2a5a3a; display: flex; flex-direction: column; }
        .files-header { padding: 12px; background: #16213e; border-bottom: 1px solid #2a5a3a; font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .files-header span { font-size: 11px; opacity: 0.7; }
        .files-list { flex: 1; overflow-y: auto; padding: 10px; }
        .file-item { background: #16213e; border-radius: 8px; padding: 8px; margin-bottom: 8px; border: 1px solid #2a5a3a; cursor: pointer; transition: all 0.3s; }
        .file-item:hover { border-color: #16a34a; background: #1a4a2a; }
        .file-item .file-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-item .file-info { font-size: 10px; opacity: 0.7; margin-top: 4px; display: flex; justify-content: space-between; }
        .file-item .delete-btn { color: #ef4444; cursor: pointer; font-size: 14px; padding: 2px 6px; }
        .file-item .delete-btn:hover { color: #dc2626; }
        .no-files { text-align: center; padding: 20px 10px; font-size: 12px; opacity: 0.6; }
        
        /* Input section */
        .input-section { padding: 15px; background: #0f3460; border-top: 2px solid #16213e; }
        .attached-files-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .attached-file { background: #16213e; border: 1px solid #16a34a; border-radius: 8px; padding: 6px 10px; font-size: 11px; display: flex; align-items: center; gap: 6px; }
        .attached-file .remove { color: #ef4444; cursor: pointer; font-size: 14px; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        .input-wrapper { flex: 1; display: flex; align-items: center; background: #16213e; border-radius: 12px; border: 2px solid #2a5a3a; padding: 0 10px; }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 14px; outline: none; }
        .attach-btn { background: #4ade80; border: none; color: #0f3460; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: 700; transition: all 0.3s; }
        .attach-btn:hover { background: #22c55e; }
        .send-btn { background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); border: none; color: #fff; width: 44px; height: 40px; border-radius: 10px; cursor: pointer; font-size: 18px; transition: all 0.3s; }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        /* Hidden file input */
        #fileInput { display: none; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .files-sidebar { display: none; }
            .header h1 { font-size: 16px; }
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f3460; }
        ::-webkit-scrollbar-thumb { background: #2a5a3a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #16a34a; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header with compact model selector -->
        <div class="header">
            <h1>🤖 AI Chat Bot</h1>
            <div class="model-selector">
                <label for="modelSelect">Model:</label>
                <select id="modelSelect">
                    <option value="gpt4">🧠 GPT-4</option>
                    <option value="gpt35">⚡ GPT-3.5</option>
                    <option value="claude">🎯 Claude</option>
                    <option value="gemini">✨ Gemini</option>
                    <option value="llama">🦙 Llama</option>
                </select>
            </div>
        </div>

        <!-- Features bar -->
        <div class="features">
            <button class="feature-btn active" onclick="toggleFeature('fullresponse')">📝 Full Response</button>
            <button class="feature-btn" onclick="toggleFeature('search')">🔍 Search</button>
            <button class="feature-btn" onclick="toggleFeature('reasoning')">💭 Reasoning</button>
            <button class="feature-btn" onclick="toggleFeature('creativity')">🎨 Creativity</button>
        </div>

        <!-- Main content -->
        <div class="main-content">
            <!-- Chat area -->
            <div class="chat-area" id="chatArea"></div>
            
            <!-- Files sidebar -->
            <div class="files-sidebar">
                <div class="files-header">
                    📁 Files
                    <span id="fileCount">0</span>
                </div>
                <div class="files-list" id="filesList">
                    <div class="no-files">No files uploaded yet</div>
                </div>
            </div>
        </div>

        <!-- Input section -->
        <div class="input-section">
            <div class="attached-files-preview" id="attachedFilesPreview"></div>
            <div class="input-row">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Type your message..." />
                </div>
                <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
            <input type="file" id="fileInput" multiple onchange="handleFileSelect(event)" />
        </div>
    </div>

    <script>
        // State
        let selectedModel = 'gpt4';
        let selectedFeatures = ['fullresponse'];
        let storedFiles = [];
        let attachedFilesForMessage = [];
        let isLoading = false;
        const RATE_LIMIT = 10;
        const RATE_LIMIT_WINDOW = 60000;
        let messageCount = 0;
        let lastResetTime = Date.now();

        const modelNames = {
            gpt4: 'GPT-4',
            gpt35: 'GPT-3.5 Turbo',
            claude: 'Claude 3 Opus',
            gemini: 'Google Gemini',
            llama: 'Llama 3'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadFilesFromStorage();
            addMessage('👋 Welcome! Select a model and start chatting. You can attach files using the 📎 button.', 'bot');
        });

        // Model selection
        document.getElementById('modelSelect').addEventListener('change', (e) => {
            selectedModel = e.target.value;
            addMessage(`🔄 Switched to ${modelNames[selectedModel]}`, 'bot');
        });

        // Feature toggle
        function toggleFeature(feature) {
            const btn = event.target;
            if (selectedFeatures.includes(feature)) {
                selectedFeatures = selectedFeatures.filter(f => f !== feature);
                btn.classList.remove('active');
            } else {
                selectedFeatures.push(feature);
                btn.classList.add('active');
            }
        }

        // File handling
        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            files.forEach(file => {
                const fileId = Date.now() + Math.random().toString(36).substr(2, 9);
                const fileSize = formatFileSize(file.size);
                const fileType = file.type || 'unknown';
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    storedFiles.push({
                        id: fileId,
                        name: file.name,
                        size: fileSize,
                        type: fileType,
                        content: e.target.result,
                        uploadDate: new Date().toLocaleDateString()
                    });
                    saveFilesToStorage();
                    renderFilesList();
                    addMessage(`✅ File "${file.name}" uploaded successfully!`, 'bot');
                };
                
                if (file.type.startsWith('image/')) {
                    reader.readAsDataURL(file);
                } else if (file.type === 'application/pdf') {
                    reader.readAsDataURL(file);
                } else {
                    reader.readAsText(file);
                }
            });
            event.target.value = '';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function renderFilesList() {
            const filesList = document.getElementById('filesList');
            const fileCount = document.getElementById('fileCount');
            
            fileCount.textContent = storedFiles.length;
            
            if (storedFiles.length === 0) {
                filesList.innerHTML = '<div class="no-files">No files uploaded yet</div>';
                return;
            }
            
            filesList.innerHTML = storedFiles.map(file => `
                <div class="file-item" onclick="previewFile('${file.id}')">
                    <div class="file-name">📄 ${file.name}</div>
                    <div class="file-info">
                        <span>${file.size}</span>
                        <span class="delete-btn" onclick="event.stopPropagation(); deleteFile('${file.id}')">🗑️</span>
                    </div>
                </div>
            `).join('');
        }

        function previewFile(fileId) {
            const file = storedFiles.find(f => f.id === fileId);
            if (!file) return;
            addMessage(`📎 Preview: ${file.name} (${file.size}) - Type: ${file.type}`, 'bot');
        }

        function deleteFile(fileId) {
            const fileIndex = storedFiles.findIndex(f => f.id === fileId);
            if (fileIndex > -1) {
                const fileName = storedFiles[fileIndex].name;
                storedFiles.splice(fileIndex, 1);
                saveFilesToStorage();
                renderFilesList();
                addMessage(`🗑️ File "${fileName}" deleted`, 'bot');
            }
        }

        function saveFilesToStorage() {
            try {
                localStorage.setItem('chatFiles', JSON.stringify(storedFiles));
            } catch (e) {
                console.error('Storage full, cannot save files');
            }
        }

        function loadFilesFromStorage() {
            try {
                const saved = localStorage.getItem('chatFiles');
                if (saved) {
                    storedFiles = JSON.parse(saved);
                    renderFilesList();
                }
            } catch (e) {
                console.error('Error loading files from storage');
            }
        }

        function attachFile(fileId) {
            const file = storedFiles.find(f => f.id === fileId);
            if (file && !attachedFilesForMessage.find(f => f.id === fileId)) {
                attachedFilesForMessage.push(file);
                renderAttachedFilesPreview();
            }
        }

        function removeAttachedFile(fileId) {
            attachedFilesForMessage = attachedFilesForMessage.filter(f => f.id !== fileId);
            renderAttachedFilesPreview();
        }

        function renderAttachedFilesPreview() {
            const preview = document.getElementById('attachedFilesPreview');
            if (attachedFilesForMessage.length === 0) {
                preview.innerHTML = '';
                return;
            }
            preview.innerHTML = attachedFilesForMessage.map(file => `
                <div class="attached-file">
                    📎 ${file.name}
                    <span class="remove" onclick="removeAttachedFile('${file.id}')">×</span>
                </div>
            `).join('');
        }

        // Chat functionality
        function checkRateLimit() {
            const now = Date.now();
            if (now - lastResetTime > RATE_LIMIT_WINDOW) {
                messageCount = 0;
                lastResetTime = now;
            }
            if (messageCount >= RATE_LIMIT) return false;
            messageCount++;
            return true;
        }

        function addMessage(text, sender, files = []) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            let content = text;
            if (files.length > 0) {
                content += '<br>' + files.map(f => `<span class="file-attachment">📎 ${f.name}</span>`).join('');
            }
            
            messageDiv.innerHTML = content;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function sendMessage() {
            if (isLoading) return;
            
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message && attachedFilesForMessage.length === 0) return;
            
            if (!checkRateLimit()) {
                addMessage('⚠️ Rate limit reached! Please wait a moment.', 'error');
                return;
            }
            
            // Display user message
            const filesToSend = [...attachedFilesForMessage];
            if (message || filesToSend.length > 0) {
                addMessage(message || '📎 Attached files', 'user', filesToSend);
            }
            
            input.value = '';
            attachedFilesForMessage = [];
            renderAttachedFilesPreview();
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;

            // Simulate AI response
            setTimeout(() => {
                const featuresText = selectedFeatures.length > 0 ? `with ${selectedFeatures.join(', ')}` : '';
                const fileInfo = filesToSend.length > 0 
                    ? `\n\nI received ${filesToSend.length} file(s): ${filesToSend.map(f => f.name).join(', ')}` 
                    : '';
                
                const response = `🤖 **${modelNames[selectedModel]}** here!\n\n` +
                    `You said: "${message}"\n` +
                    `${fileInfo}\n\n` +
                    `I'm processing your request ${featuresText}. ` +
                    `This is a simulated response. In a real implementation, this would connect to the actual AI API.\n\n` +
                    `How can I help you further?`;
                
                addMessage(response, 'bot');
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
            }, 1500);
        }

        // Enter key to send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
